<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0A0B0F;
    --card:     #12141A;
    --border:   #1E2130;
    --accent:   #5B6EF5;
    --accent2:  #4A5CE0;
    --text:     #E2E4F0;
    --muted:    #8A8FA8;
    --green:    #3ECF8E;
    --amber:    #ECB22E;
    --red:      #E8507A;
    --purple:   #9B6EF5;
    --p1:       #E8507A;
    --p2:       #ECB22E;
    --p3:       #5B6EF5;
    --p4:       #3ECF8E;
    --p5:       #4A5564;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .app { display: flex; flex-direction: column; height: 100vh; }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
  }

  header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  header h1 span { color: var(--accent); }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    flex: 1;
    overflow: hidden;
  }

  /* ── Tasks panel ── */
  .tasks-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  .tasks-toolbar {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .filter-tabs { display: flex; gap: 4px; }
  .filter-tab {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    transition: all .15s;
  }
  .filter-tab.active {
    background: var(--border);
    color: var(--text);
    border-color: var(--border);
  }
  .filter-tab:hover:not(.active) { color: var(--text); }

  .tasks-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── Task card ── */
  .task-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: border-color .15s;
  }
  .task-card:hover { border-color: #2A2D40; }
  .task-card.status-complete { opacity: .5; }
  .task-card.status-in_progress { border-color: var(--accent); }

  .task-priority {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    margin-top: 1px;
  }
  .p1 { background: rgba(232,80,122,.15); color: var(--p1); }
  .p2 { background: rgba(236,178,46,.15); color: var(--p2); }
  .p3 { background: rgba(91,110,245,.15); color: var(--p3); }
  .p4 { background: rgba(62,207,142,.15); color: var(--p4); }
  .p5 { background: rgba(74,85,100,.2);   color: var(--p5); }

  .task-body { flex: 1; min-width: 0; }
  .task-title { font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-desc  { color: var(--muted); font-size: 12px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }

  .status-chip {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .03em;
  }
  .chip-pending     { background: rgba(138,143,168,.12); color: var(--muted); }
  .chip-in_progress { background: rgba(91,110,245,.15);  color: var(--accent); }
  .chip-complete    { background: rgba(62,207,142,.12);  color: var(--green); }
  .chip-failed      { background: rgba(232,80,122,.12);  color: var(--red); }

  .task-date { color: var(--muted); font-size: 11px; margin-left: auto; }

  .task-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .btn-icon {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all .15s;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); background: rgba(91,110,245,.08); }
  .btn-icon.del:hover { border-color: var(--red); color: var(--red); background: rgba(232,80,122,.08); }

  /* ── Log panel ── */
  .log-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .log-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

  .log-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    font-family: 'SF Mono', 'Fira Mono', monospace;
    font-size: 11px;
    line-height: 1.6;
  }

  .log-line { color: var(--muted); padding: 1px 4px; }
  .log-line .ts { color: #3A3F55; }
  .log-line.added   .msg { color: var(--green); }
  .log-line.updated .msg { color: var(--accent); }
  .log-line.deleted .msg { color: var(--red); }
  .log-line.server  .msg { color: var(--amber); }
  .log-line.worker  .msg { color: var(--purple); }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    padding: 40px;
    text-align: center;
  }
  .empty-icon { font-size: 36px; opacity: .4; }
  .empty-text { font-size: 13px; }

  /* ── Buttons ── */
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: #2A2D40; }

  /* ── Modal ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 480px;
    max-width: 95vw;
    padding: 24px;
    transform: translateY(12px);
    transition: transform .2s;
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color .15s;
    font-family: inherit;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent);
  }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: var(--card); }

  .priority-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .priority-opt {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    transition: all .15s;
  }
  .priority-opt:hover { border-color: #2A2D40; color: var(--text); }
  .priority-opt.sel-1 { border-color: var(--p1); color: var(--p1); background: rgba(232,80,122,.1); }
  .priority-opt.sel-2 { border-color: var(--p2); color: var(--p2); background: rgba(236,178,46,.1); }
  .priority-opt.sel-3 { border-color: var(--p3); color: var(--p3); background: rgba(91,110,245,.1); }
  .priority-opt.sel-4 { border-color: var(--p4); color: var(--p4); background: rgba(62,207,142,.1); }
  .priority-opt.sel-5 { border-color: #4A5564;   color: #8A9BB0;   background: rgba(74,85,100,.15); }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 24px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 0;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .stat {
    padding: 10px 20px 10px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }
  .stat-num { font-size: 16px; font-weight: 600; color: var(--text); }
  .stat:not(:last-child) { margin-right: 20px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>Todo <span>Dashboard</span></h1>
    <div class="header-actions">
      <div id="stats" style="display:flex;gap:20px;font-size:12px;color:var(--muted)"></div>
      <button class="btn btn-primary" onclick="openAdd()">+ Add Task</button>
    </div>
  </header>

  <div class="main">
    <!-- Tasks -->
    <div class="tasks-panel">
      <div class="tasks-toolbar">
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
          <button class="filter-tab" onclick="setFilter('pending',this)">Pending</button>
          <button class="filter-tab" onclick="setFilter('in_progress',this)">In Progress</button>
          <button class="filter-tab" onclick="setFilter('complete',this)">Done</button>
        </div>
      </div>
      <div class="tasks-list" id="taskList"></div>
    </div>

    <!-- Log -->
    <div class="log-panel">
      <div class="log-header">
        <div class="live-dot"></div>
        Activity Log
      </div>
      <div class="log-body" id="logBody"></div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="overlay" onclick="closeIfBackdrop(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">New Task</div>

    <div class="form-group">
      <label>Title *</label>
      <input class="form-input" id="fTitle" placeholder="What needs to be done?" />
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea class="form-textarea" id="fDesc" placeholder="Details, context, links…"></textarea>
    </div>

    <div class="form-group">
      <label>Priority</label>
      <div class="priority-grid">
        <button class="priority-opt" data-p="1" onclick="setPriority(1)">P1<br><span style="font-weight:400;font-size:10px">Critical</span></button>
        <button class="priority-opt" data-p="2" onclick="setPriority(2)">P2<br><span style="font-weight:400;font-size:10px">High</span></button>
        <button class="priority-opt" data-p="3" onclick="setPriority(3)">P3<br><span style="font-weight:400;font-size:10px">Medium</span></button>
        <button class="priority-opt" data-p="4" onclick="setPriority(4)">P4<br><span style="font-weight:400;font-size:10px">Low</span></button>
        <button class="priority-opt" data-p="5" onclick="setPriority(5)">P5<br><span style="font-weight:400;font-size:10px">Someday</span></button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveTask()">Add Task</button>
    </div>
  </div>
</div>

<script>
let tasks = [];
let filter = 'all';
let editId = null;
let selPriority = 3;
let logLines = [];

const priorityLabel = ['','Critical','High','Medium','Low','Someday'];
const statusOrder = { in_progress: 0, pending: 1, complete: 2, failed: 3 };

// ── Fetch ──────────────────────────────────────────────────────────────────

async function loadTasks() {
  try {
    const res = await fetch('/api/tasks');
    tasks = await res.json();
    render();
    updateStats();
  } catch(e) { console.error(e); }
}

async function loadLog() {
  try {
    const res = await fetch('/api/log');
    const { lines } = await res.json();
    if (lines.length !== logLines.length || lines[lines.length-1] !== logLines[logLines.length-1]) {
      logLines = lines;
      renderLog();
    }
  } catch(e) {}
}

// ── Render tasks ───────────────────────────────────────────────────────────

function render() {
  const list = document.getElementById('taskList');
  let visible = tasks.filter(t => filter === 'all' || t.status === filter);
  visible.sort((a,b) => {
    const so = (statusOrder[a.status]??9) - (statusOrder[b.status]??9);
    if (so !== 0) return so;
    return a.priority - b.priority;
  });

  if (!visible.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">✓</div>
      <div class="empty-text">${filter === 'all' ? 'No tasks yet. Add one to get started.' : 'No '+filter+' tasks.'}</div>
    </div>`;
    return;
  }

  list.innerHTML = visible.map(t => `
    <div class="task-card status-${t.status}">
      <div class="task-priority p${t.priority}">P${t.priority}</div>
      <div class="task-body">
        <div class="task-title">${esc(t.title)}</div>
        ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
        ${t.work_log ? `<div class="task-desc" style="color:var(--accent);margin-top:4px">↳ ${esc(t.work_log)}</div>` : ''}
        <div class="task-meta">
          <span class="status-chip chip-${t.status}">${t.status.replace('_',' ')}</span>
          <span class="task-date">${fmtDate(t.created)}</span>
        </div>
      </div>
      <div class="task-actions">
        ${t.status === 'pending' ? `<button class="btn-icon" title="Mark in progress" onclick="updateStatus('${t.id}','in_progress')">▶</button>` : ''}
        ${t.status === 'in_progress' ? `<button class="btn-icon" title="Mark complete" onclick="updateStatus('${t.id}','complete')" style="color:var(--green)">✓</button>` : ''}
        ${t.status !== 'complete' ? `<button class="btn-icon" title="Edit" onclick="openEdit('${t.id}')">✎</button>` : ''}
        <button class="btn-icon del" title="Delete" onclick="deleteTask('${t.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

function updateStats() {
  const pending = tasks.filter(t => t.status === 'pending').length;
  const inprog  = tasks.filter(t => t.status === 'in_progress').length;
  const done    = tasks.filter(t => t.status === 'complete').length;
  document.getElementById('stats').innerHTML = `
    <span>${pending} pending</span>
    <span style="color:var(--accent)">${inprog} in progress</span>
    <span style="color:var(--green)">${done} done</span>
  `;
}

// ── Render log ─────────────────────────────────────────────────────────────

function renderLog() {
  const body = document.getElementById('logBody');
  if (!logLines.length) {
    body.innerHTML = `<div style="color:var(--muted);padding:10px;font-size:11px">No activity yet.</div>`;
    return;
  }
  body.innerHTML = logLines.map(line => {
    const m = line.match(/^\[([^\]]+)\] (.+)$/);
    if (!m) return `<div class="log-line"><span class="msg">${esc(line)}</span></div>`;
    const [,ts,msg] = m;
    const cls = msg.startsWith('ADDED') ? 'added'
              : msg.startsWith('UPDATED') ? 'updated'
              : msg.startsWith('DELETED') ? 'deleted'
              : msg.startsWith('SERVER') ? 'server'
              : msg.startsWith('WORKER') ? 'worker'
              : '';
    return `<div class="log-line ${cls}"><span class="ts">${ts.slice(11)} </span><span class="msg">${esc(msg)}</span></div>`;
  }).join('');
  body.scrollTop = body.scrollHeight;
}

// ── Actions ────────────────────────────────────────────────────────────────

async function updateStatus(id, status) {
  await fetch(`/api/tasks/${id}`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({status})
  });
  await loadTasks();
  await loadLog();
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
  await loadTasks();
  await loadLog();
}

// ── Modal ──────────────────────────────────────────────────────────────────

function openAdd() {
  editId = null;
  document.getElementById('modalTitle').textContent = 'New Task';
  document.getElementById('saveBtn').textContent = 'Add Task';
  document.getElementById('fTitle').value = '';
  document.getElementById('fDesc').value = '';
  setPriority(3);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('fTitle').focus();
}

function openEdit(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  editId = id;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('saveBtn').textContent = 'Save';
  document.getElementById('fTitle').value = t.title;
  document.getElementById('fDesc').value = t.description || '';
  setPriority(t.priority);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('fTitle').focus();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editId = null;
}

function closeIfBackdrop(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function setPriority(p) {
  selPriority = p;
  document.querySelectorAll('.priority-opt').forEach(el => {
    el.className = 'priority-opt';
    if (parseInt(el.dataset.p) === p) el.classList.add(`sel-${p}`);
  });
}

async function saveTask() {
  const title = document.getElementById('fTitle').value.trim();
  const desc  = document.getElementById('fDesc').value.trim();
  if (!title) { document.getElementById('fTitle').focus(); return; }

  const body = JSON.stringify({ title, description: desc, priority: selPriority });

  if (editId) {
    await fetch(`/api/tasks/${editId}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body
    });
  } else {
    await fetch('/api/tasks', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body
    });
  }

  closeModal();
  await loadTasks();
  await loadLog();
}

// ── Filter ─────────────────────────────────────────────────────────────────

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── Helpers ────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000)+'m ago';
  if (diff < 86400000) return Math.floor(diff/3600000)+'h ago';
  return d.toLocaleDateString('en', {month:'short',day:'numeric'});
}

// ── Keyboard ───────────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    if (document.getElementById('overlay').classList.contains('open')) saveTask();
  }
});

// ── Init ───────────────────────────────────────────────────────────────────

loadTasks();
loadLog();
setInterval(loadTasks, 10000);
setInterval(loadLog, 5000);
</script>
</body>
</html>
